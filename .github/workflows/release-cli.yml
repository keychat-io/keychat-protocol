name: Release CLI

on:
  push:
    tags:
      - "cli-v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: cargo build --release -p keychat-cli --target ${{ matrix.target }}

      - name: Package
        run: |
          tar -czf keychat-${{ matrix.target }}.tar.gz \
            -C target/${{ matrix.target }}/release keychat

      - uses: actions/upload-artifact@v4
        with:
          name: keychat-${{ matrix.target }}
          path: keychat-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#cli-v}"
          gh release create "$TAG" artifacts/*.tar.gz \
            --repo "${{ github.repository }}" \
            --title "keychat-cli ${VERSION}" \
            --generate-notes

  update-tap:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute SHA256
        id: sha
        run: |
          for f in artifacts/*.tar.gz; do
            name=$(basename "$f" .tar.gz)
            sha=$(sha256sum "$f" | awk '{print $1}')
            echo "${name}_sha=${sha}" >> "$GITHUB_OUTPUT"
          done

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: keychat-io/homebrew-tap
          token: ${{ secrets.TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#cli-v}"
          FORMULA="homebrew-tap/Formula/keychat.rb"

          sed -i "s/version \".*\"/version \"${VERSION}\"/" "$FORMULA"

          update_sha() {
            local target=$1 sha=$2
            # Replace the URL line for this target, then the next sha256 line
            python3 -c "
          import re
          with open('${FORMULA}') as f:
              lines = f.readlines()
          for i, line in enumerate(lines):
              if '${target}' in line and 'url' in line:
                  lines[i] = re.sub(r'download/cli-v[^/]*/', 'download/${TAG}/', lines[i])
                  for j in range(i+1, min(i+3, len(lines))):
                      if 'sha256' in lines[j]:
                          lines[j] = re.sub(r'sha256 \"[^\"]*\"', 'sha256 \"${sha}\"', lines[j])
                          break
                  break
          with open('${FORMULA}', 'w') as f:
              f.writelines(lines)
          "
          }

          update_sha "aarch64-apple-darwin" "${{ steps.sha.outputs.keychat-aarch64-apple-darwin_sha }}"

      - name: Commit and push tap
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "keychat ${TAG#cli-v}"
          git push

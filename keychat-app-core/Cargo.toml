[package]
name = "keychat-app-core"
version = "0.1.0"
edition = "2021"

[dependencies]
libkeychat = { path = "../libkeychat", features = ["storage"] }
rusqlite = { version = "0.32", features = ["bundled-sqlcipher"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
async-trait = "0.1"
